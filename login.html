<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creeper Bot — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --g1: #4ade80;
      --g2: #16a34a;
      --g3: #14532d;
      --dark: #050f05;
      --card: #0d1f0d;
      --border: #1a3a1a;
      --text: #f0fdf4;
      --muted: #86efac;
      --discord: #5865F2;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(74,222,128,0.07) 0%, transparent 65%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 0.5; transform: translate(-50%,-50%) scale(1.15); }
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: min(420px, 92vw);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Creeper face */
    .face {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      width: 100px;
      margin: 0 auto 1.8rem;
      filter: drop-shadow(0 0 20px rgba(74,222,128,0.5));
    }
    .p { width: 100%; aspect-ratio: 1; border-radius: 1px; }
    .pg { background: var(--g1); }
    .pm { background: var(--g2); }
    .pk { background: #030a03; }
    .pe { background: transparent; }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.2rem;
      color: var(--g1);
      text-shadow: 3px 3px 0 var(--g3), 0 0 30px rgba(74,222,128,0.4);
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .login-text {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.2rem;
      font-weight: 600;
    }

    .btn-discord {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
      background: var(--discord);
      color: #fff;
      padding: 1rem;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.05rem;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(88,101,242,0.3);
      margin-bottom: 1rem;
    }
    .btn-discord:hover {
      background: #4752c4;
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(88,101,242,0.5);
    }

    /* Discord logo SVG inline */
    .discord-icon {
      width: 22px; height: 22px;
      fill: white;
      flex-shrink: 0;
    }

    .notice {
      font-size: 0.78rem;
      color: #2d5a2d;
      line-height: 1.5;
    }
    .notice span { color: var(--muted); }

    /* Back link */
    .back {
      position: relative; z-index: 1;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .back:hover { color: var(--g1); }

    /* Floating pixels */
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.06; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

  <script>
